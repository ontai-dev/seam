---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: seammemberships.seam.ontai.dev
spec:
  group: seam.ontai.dev
  names:
    kind: SeamMembership
    listKind: SeamMembershipList
    plural: seammemberships
    shortNames:
    - sm
    singular: seammembership
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.admitted
      name: Admitted
      type: boolean
    - jsonPath: .spec.tier
      name: Tier
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SeamMembership is the formal join declaration for an operator wishing to
          become a member of the Seam infrastructure family. Guardian validates and
          admits the membership after verifying the operator's RBACProfile. Operators
          that are not members may not be allocated PermissionSnapshots.
          Migrated from infrastructure.ontai.dev to seam.ontai.dev (MIGRATION-3.8).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SeamMembershipSpec defines the desired state of a SeamMembership.
            properties:
              appIdentityRef:
                description: |-
                  AppIdentityRef references the operator's application-layer identity.
                  For Seam family operators this is the operator name (guardian, platform,
                  wrapper, conductor, seam-core, vortex).
                  Format: {name} -- references an AppIdentity in the domain-core (future)
                  or the operator's service account name (current).
                type: string
              domainIdentityRef:
                description: |-
                  DomainIdentityRef references the DomainIdentity at core.ontai.dev
                  that this operator traces to. Must match the domainIdentityRef on
                  the operator's RBACProfile.
                type: string
              principalRef:
                description: |-
                  PrincipalRef is the Kubernetes service account that this operator
                  runs as. Format: system:serviceaccount:{namespace}:{name}
                  Must match the principalRef on the operator's RBACProfile.
                type: string
              tier:
                description: |-
                  Tier declares the membership tier. Valid values: infrastructure, application.
                  infrastructure: Seam family operators (guardian, platform, wrapper, etc.)
                  application: Application operators (vortex, future app operators)
                enum:
                - infrastructure
                - application
                type: string
            required:
            - appIdentityRef
            - domainIdentityRef
            - principalRef
            - tier
            type: object
          status:
            description: SeamMembershipStatus defines the observed state of a SeamMembership.
            properties:
              admitted:
                description: Admitted is true when Guardian has validated and admitted
                  this member.
                type: boolean
              admittedAt:
                description: AdmittedAt is the timestamp when Guardian admitted this
                  member.
                format: date-time
                type: string
              conditions:
                description: Conditions is the list of status conditions for this
                  SeamMembership.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              permissionSnapshotRef:
                description: |-
                  PermissionSnapshotRef is the name of the PermissionSnapshot Guardian
                  resolved for this member. Set after admission.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
